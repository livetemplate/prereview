version: 2

builds:
  - id: prereview
    main: .
    binary: prereview
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    ldflags:
      # prereview's main.go only has `var version` (no commit/date),
      # so only -X main.version is set.
      - -s -w
      - -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

# Homebrew formula published to the livetemplate/homebrew-tap repo on every
# release: `brew install livetemplate/tap/prereview`. Requires the
# HOMEBREW_TAP_GITHUB_TOKEN secret (a PAT with write access to that tap repo)
# to be set in the release workflow env; without it this step fails the run.
#
# We use `brews` (a formula) and NOT `homebrew_casks` despite goreleaser's
# deprecation notice: Homebrew casks are macOS-only, but prereview is
# routinely installed via Homebrew on Linux remote/SSH boxes, and only a
# formula works on Linuxbrew.
brews:
  - repository:
      owner: livetemplate
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/livetemplate/prereview"
    description: "Local per-line code review webapp"
    license: "MIT"
    # git is a hard runtime prerequisite; tailscale is optional.
    dependencies:
      - name: git
    caveats: |
      prereview needs git on your PATH at runtime.
      Upgrade with: brew upgrade prereview
    test: |
      system "#{bin}/prereview", "--version"

# Scoop manifest published to the livetemplate/scoop-bucket repo for Windows:
# `scoop bucket add livetemplate https://github.com/livetemplate/scoop-bucket`
# then `scoop install prereview`. Requires the SCOOP_BUCKET_GITHUB_TOKEN secret.
scoops:
  - repository:
      owner: livetemplate
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
    homepage: "https://github.com/livetemplate/prereview"
    description: "Local per-line code review webapp"
    license: "MIT"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix(\(.+\))?:'
      order: 1
    - title: Performance
      regexp: '^perf(\(.+\))?:'
      order: 2
    - title: Documentation
      regexp: '^docs(\(.+\))?:'
      order: 3
    - title: Others
      order: 999
  filters:
    exclude:
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: livetemplate
    name: prereview
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## prereview {{ .Tag }}

    A local per-line code review webapp. Run it in your repo, click the
    lines you want changed, leave comments; a CSV is written that an LLM
    (or you) can read and act on.

    ### Installation

    **Go install:**
    ```bash
    go install github.com/livetemplate/prereview@{{ .Tag }}
    ```

    **Binary download:** grab the archive for your platform from the
    assets below.
  footer: |
    ---
    Built on [livetemplate](https://github.com/livetemplate/livetemplate).
